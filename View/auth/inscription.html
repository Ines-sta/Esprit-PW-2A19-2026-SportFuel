<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>S'inscrire - SportFuel</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .image-area {
      background-image: url('../shared/assets/images/img1.png') !important;
      background-size: cover !important;
      background-position: center !important;
      background-repeat: no-repeat !important;
    }
    .role-label {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin: 10px 0 6px;
      display: block;
    }
    .role-selector {
      display: flex !important;
      gap: 10px;
      width: 100%;
      margin-bottom: 10px;
    }
    .role-btn {
      flex: 1 !important;
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: center !important;
      gap: 5px !important;
      padding: 14px 8px !important;
      background: rgba(255,255,255,0.07) !important;
      border: 2px solid rgba(255,255,255,0.2) !important;
      border-radius: 14px !important;
      color: rgba(255,255,255,0.55) !important;
      font-family: 'Poppins', sans-serif !important;
      font-size: 13px !important;
      font-weight: 600 !important;
      cursor: pointer !important;
      transition: all 0.3s ease !important;
      width: auto !important;
      margin-top: 0 !important;
    }
    .role-btn .r-icon { font-size: 26px; display: block; }
    .role-btn .r-name { font-size: 13px; display: block; }
    .role-btn .r-sub  { font-size: 10px; font-weight: 400; opacity: 0.6; display: block; }
    .role-btn:hover {
      background: rgba(255,255,255,0.12) !important;
      border-color: rgba(255,255,255,0.4) !important;
      color: white !important;
      transform: translateY(-2px) !important;
    }
    .role-btn.sel-sportif {
      background: rgba(82,183,136,0.2) !important;
      border-color: #52b788 !important;
      color: #52b788 !important;
      box-shadow: 0 4px 16px rgba(82,183,136,0.3) !important;
    }
    .role-btn.sel-admin {
      background: rgba(244,162,97,0.2) !important;
      border-color: #f4a261 !important;
      color: #f4a261 !important;
      box-shadow: 0 4px 16px rgba(244,162,97,0.3) !important;
    }
    #submitBtn { background: linear-gradient(135deg, #52b788, #2d6a4f) !important; transition: all 0.3s !important; }
    #submitBtn.admin-mode { background: linear-gradient(135deg, #f4a261, #e76f51) !important; }
    
    .server-alert {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; z-index: 9999; color: white;
      font-family: 'Poppins', sans-serif; text-align: center; padding: 20px;
    }
    .server-alert h2 { color: #f4a261; font-size: 1.6rem; margin-bottom: 12px; }
    .server-alert p  { color: rgba(255,255,255,0.7); margin-bottom: 20px; }
    .server-alert a  {
      padding: 14px 28px; background: linear-gradient(135deg, #52b788, #f4a261);
      color: white; text-decoration: none; border-radius: 999px;
      font-weight: 700; font-size: 15px;
    }

    /* Face ID Modal Styles */
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 1100;
        align-items: center;
        justify-content: center;
        backdrop-filter: blur(5px);
    }
    .modal-content {
        background: #1a1a1a;
        padding: 35px;
        border-radius: 24px;
        text-align: center;
        max-width: 400px;
        width: 90%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .modal-icon { font-size: 60px; margin-bottom: 20px; display: block; }
    .modal-title { font-size: 24px; color: #fff; margin-bottom: 12px; font-family: 'Poppins', sans-serif; }
    .modal-msg { color: rgba(255, 255, 255, 0.7); margin-bottom: 30px; line-height: 1.6; font-size: 15px; }
    .modal-btns { display: flex; flex-direction: column; gap: 12px; }
    .modal-btn-primary { background: #52b788; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; width: 100%; }
    .modal-btn-secondary { background: transparent; color: rgba(255, 255, 255, 0.5); border: none; padding: 10px; cursor: pointer; }
    .modal-btn-secondary:hover { color: #fff; }
  </style>
  <script>
    if (window.location.protocol === 'file:') {
      const role = new URLSearchParams(window.location.search).get('role') || '';
      const correct = 'http://localhost/Esprit-PW-2A19-2526-SportFuel/View/auth/inscription.html' + (role ? '?role=' + role : '');
      document.addEventListener('DOMContentLoaded', function() {
        document.body.innerHTML = `
          <div class="server-alert">
            <h2>⚠️ Mauvaise ouverture !</h2>
            <p>Ce fichier doit être ouvert via <strong>XAMPP</strong>, pas directement depuis votre disque.<br><br>
            Assurez-vous que <strong>Apache</strong> et <strong>MySQL</strong> sont démarrés dans XAMPP.</p>
            <a href="${correct}">🚀 Accéder via localhost</a>
          </div>`;
      });
    }
  </script>
</head>
<body>
  <div class="panel">
    <div class="image-area">
      <h3>Hello friends, ready to start? 🚀</h3>
    </div>
    <div class="form-section">
      <div class="form-box">
        <h2>Inscription</h2>
        <form id="inscriptionForm" action="../../Controller/auth/AuthController.php?action=inscription" method="POST" novalidate>
        <input type="hidden" name="role" id="roleInput" value="Sportif">

        <span class="role-label">Je m'inscris en tant que</span>
        <div class="role-selector">
          <button type="button" class="role-btn sel-sportif" id="btnSportif">
            <span class="r-icon">🏃</span>
            <span class="r-name">Sportif</span>
            <span class="r-sub">Profil &amp; suivi</span>
          </button>
          <button type="button" class="role-btn" id="btnAdmin">
            <span class="r-icon">⭐</span>
            <span class="r-name">Admin</span>
            <span class="r-sub">Gestion des membres</span>
          </button>
        </div>

          <div class="form-group">
              <input type="text" name="nom" id="nom" placeholder="👤 Nom Complet" required 
                     pattern="[A-Za-zÀ-ÿ\s]+" title="Le nom ne doit contenir que des lettres et des espaces.">
          </div>

          <div class="form-group">
              <input type="email" name="email" id="email" placeholder="📧 Email" required>
          </div>

          <div id="passwordGroup">
            <input type="password" name="password" id="password" placeholder="🔒 Mot de passe" required>
            <input type="password" name="confirm_password" id="confirmPassword" placeholder="🔒 Confirmer le mot de passe" required>
          </div>
          <input type="text" name="age" id="age" placeholder="📅 Âge" inputmode="numeric" pattern="[0-9]*" title="Veuillez entrer un nombre.">
          <input type="text" name="poids" id="poids" placeholder="⚖️ Poids (kg)" inputmode="numeric" pattern="[0-9]*" title="Veuillez entrer un nombre.">
          <input type="text" name="taille" id="taille" placeholder="📏 Taille (cm)" inputmode="numeric" pattern="[0-9]*" title="Veuillez entrer un nombre.">
          <button type="submit"  id="submitBtn">🏃 S'inscrire comme Sportif</button>
          
          <div class="separator" style="display: flex; align-items: center; text-align: center; margin: 15px 0; color: rgba(255, 255, 255, 0.4); font-size: 11px; text-transform: uppercase; letter-spacing: 1px;">
              <span style="flex: 1; border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin-right: .5em;"></span>
              ou
              <span style="flex: 1; border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin-left: .5em;"></span>
          </div>

          <button type="button" id="manualFaceIdBtn" style="width: 100%; background: transparent; border: 1px solid #52b788; color: #52b788; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
              <span>🪪</span> Configurer Face ID
          </button>
        </form>

        <a class="link-btn" href="connexion.html">Déjà un compte ? Se connecter</a>
      </div>
    </div>
  </div>
  <!-- Face ID Registration Modal -->
  <div id="faceIdModal" class="modal-overlay">
    <div class="modal-content">
        <span class="modal-icon">🪪</span>
        <h3 class="modal-title">Activer la Reconnaissance Faciale</h3>
        <p class="modal-msg">Connectez-vous avec votre visage. Placez-vous devant la caméra.</p>
        
        <div class="camera-box" style="width: 180px; height: 180px; border-radius: 50%; overflow: hidden; margin: 0 auto 20px; border: 3px solid #52b788; background: #000; position: relative;">
            <video id="webcamReg" autoplay muted playsinline style="width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1);"></video>
            <div class="scan-line" style="position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #52b788; box-shadow: 0 0 10px #52b788; animation: scan-move 2s linear infinite;"></div>
        </div>

        <div class="modal-btns">
            <button id="activateFaceIdBtn" class="modal-btn-primary">Capturer mon visage</button>
            <button id="skipFaceIdBtn" class="modal-btn-secondary">Plus tard</button>
        </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <script src="inscription.js"></script>
</body>
</html>
